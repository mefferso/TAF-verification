<!doctype html>
<html>
<head>
<base target="_top">
<style>
body{font-family:Arial,sans-serif;margin:18px;color:#1f2933} .panel{border:1px solid #d0d7de;border-radius:10px;padding:14px;margin:14px 0} .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;align-items:end} label{font-weight:700;display:block;margin-bottom:4px} input,select,button{width:100%;box-sizing:border-box;padding:8px;border-radius:7px;border:1px solid #cbd5e1;font-size:14px} button{background:#2563eb;color:white;border:0;font-weight:700;cursor:pointer} button:disabled{background:#94a3b8}.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}.metric{border:1px solid #d0d7de;border-radius:10px;padding:12px;background:#f8fafc}.value{font-size:24px;font-weight:800}table{border-collapse:collapse;width:100%;font-size:13px}th,td{border:1px solid #d0d7de;padding:6px;vertical-align:top}th{background:#f1f5f9}pre{white-space:pre-wrap;background:#0f172a;color:#e2e8f0;padding:12px;border-radius:8px}.error{color:#991b1b;background:#fee2e2;border:1px solid #fecaca;padding:10px;border-radius:8px}.ok{color:#14532d;background:#dcfce7;border:1px solid #bbf7d0;padding:10px;border-radius:8px}.warn{color:#92400e;background:#fef3c7;border:1px solid #fde68a;padding:10px;border-radius:8px}.note{color:#334155;background:#f8fafc;border:1px solid #d0d7de;padding:10px;border-radius:8px;margin-top:10px}details{margin:10px 0}summary{cursor:pointer;font-weight:700}.verifyTable th{text-align:center}.timeCell{white-space:nowrap;font-weight:700}.fcstBox,.obsBox{line-height:1.35}.cat{font-weight:800;font-size:14px}.detail{color:#475569;margin-top:3px}.tafText,.metarText{font-family:Consolas,monospace;font-size:12px;white-space:pre-wrap}.result{font-weight:800;text-align:center;white-space:nowrap}.hit{background:#dcfce7}.miss{background:#fee2e2}.falseAlarm{background:#ffedd5}.correctNeg{background:#f8fafc;color:#334155}
</style>
</head>
<body>
<h1>TAF Verification</h1>
<p>Google Apps Script web app using IEM archived station TAF and METAR data.</p>
<div class="panel"><div class="grid">
<div><label>UTC date</label><input id="date" type="date"></div>
<div><label>TAF cycle</label><select id="cycle"><option value="0">00z</option><option value="6">06z</option><option value="12" selected>12z</option><option value="18">18z</option></select></div>
<div><label>Terminal</label><select id="site"></select></div>
<div><label>Verify category</label><select id="threshold"><option value="LIFR">LIFR-or-worse</option><option value="IFR" selected>IFR-or-worse</option><option value="MVFR">MVFR-or-worse</option></select></div>
<div><label>Window hours</label><input id="windowHours" type="number" min="1" max="30" value="6"></div>
<div><label><input id="includeTempo" type="checkbox" style="width:auto"> Include TEMPO/PROB/BECMG</label></div>
<div><button id="runBtn">Run verification</button></div>
</div></div>
<div id="status"></div><div id="output"></div>
<script>
var d=new Date();d.setUTCDate(d.getUTCDate()-1);document.getElementById('date').value=d.toISOString().slice(0,10);document.getElementById('runBtn').addEventListener('click',runVerification);google.script.run.withSuccessHandler(initConfig).withFailureHandler(showError).getConfig();
function initConfig(config){var s=document.getElementById('site');s.innerHTML='<option value="All">All</option>'+config.sites.map(function(x){return '<option value="'+x+'">'+x+'</option>';}).join('');}
function runVerification(){setBusy(true);document.getElementById('output').innerHTML='';document.getElementById('status').innerHTML='<div class="ok">Fetching IEM data and verifying...</div>';var p={date:val('date'),cycle:Number(val('cycle')),site:val('site'),threshold:val('threshold'),windowHours:Number(val('windowHours')),includeTempo:document.getElementById('includeTempo').checked};google.script.run.withSuccessHandler(render).withFailureHandler(showError).runVerification(p);}
function render(data){setBusy(false);document.getElementById('status').innerHTML='';var h=[];var r=data.request;h.push('<div class="panel"><h2>Summary</h2><p><b>Window:</b> '+fmt(r.start)+' to '+fmt(r.end)+' UTC<br><b>Sites:</b> '+esc(r.sites.join(', '))+'<br><b>Threshold:</b> '+esc(r.threshold)+'-or-worse</p>'+metricCards(data.overall)+scoreNote(data.overall,r.threshold)+'</div>');if(data.tafErrors&&data.tafErrors.length){h.push('<div class="warn"><b>TAF fetch warnings:</b><br>'+data.tafErrors.map(function(e){return esc(e.site)+': '+esc(e.error);}).join('<br>')+'</div>');}if(r.sites.length>1){h.push('<div class="panel"><h2>By station</h2>'+table(data.byStation,['station','hits','misses','false_alarms','correct_negatives','POD','FAR','CSI'])+'</div>');}h.push('<div class="panel"><h2>TAF products</h2>');if(data.tafProducts&&data.tafProducts.length){data.tafProducts.forEach(function(p){h.push('<details><summary>'+esc(p.site)+' / '+esc(p.pil)+' — issued '+fmt(p.issued)+' UTC</summary><pre>'+esc(p.text)+'</pre></details>');});}else{h.push('<p>No TAF products returned.</p>');}h.push('</div>');h.push('<div class="panel"><h2>Forecast vs observed</h2>'+sideBySideTable(data.matched,r.threshold)+'</div>');document.getElementById('output').innerHTML=h.join('');}
function sideBySideTable(rows,threshold){if(!rows||!rows.length)return '<p>No rows returned.</p>';var head='<tr><th>Time</th><th>Forecast</th><th>Observed</th><th>Result</th></tr>';var body=rows.map(function(row){var res=rowResult(row,threshold);return '<tr class="'+res.cls+'"><td class="timeCell">'+fmt(row.valid)+'<br>'+esc(row.station)+'</td><td><div class="fcstBox"><div class="cat">'+esc(row.forecast_category||'')+'</div><div class="detail">TAF group</div><div class="tafText">'+esc(row.forecast_group||'')+'</div></div></td><td><div class="obsBox"><div class="cat">'+esc(row.obs_category||'')+'</div><div class="detail">vsby '+esc(cell(row.vsby))+' SM'+(row.ceiling_ft?' / cig '+esc(cell(row.ceiling_ft))+' ft':' / no cig')+'</div><div class="metarText">'+esc(row.metar||'')+'</div></div></td><td class="result">'+res.label+'</td></tr>';}).join('');return '<table class="verifyTable">'+head+body+'</table>';}
function rowResult(row,threshold){var f=eventFlag(row.forecast_category,threshold);var o=eventFlag(row.obs_category,threshold);if(f&&o)return{label:'HIT',cls:'hit'};if(!f&&o)return{label:'MISS',cls:'miss'};if(f&&!o)return{label:'FALSE ALARM',cls:'falseAlarm'};return{label:'CORRECT NEG',cls:'correctNeg'};}
function eventFlag(cat,threshold){var rank={LIFR:0,IFR:1,MVFR:2,VFR:3};if(rank[cat]===undefined||rank[threshold]===undefined)return false;return rank[cat]<=rank[threshold];}
function metricCards(s){var a=[['Hits',s.hits],['Misses',s.misses],['False Alarms',s.false_alarms],['Correct Negatives',s.correct_negatives],['POD',num(s.POD)],['FAR',num(s.FAR)],['CSI',num(s.CSI)]];return '<div class="metrics">'+a.map(function(x){return '<div class="metric"><div>'+x[0]+'</div><div class="value">'+x[1]+'</div></div>';}).join('')+'</div>';}
function scoreNote(s,threshold){if((s.hits+s.misses+s.false_alarms)===0){return '<div class="note">No '+esc(threshold)+'-or-worse event was forecast or observed during this window. POD/FAR/CSI are not applicable; the rows are correct negatives.</div>';}return '';}
function table(rows,cols){if(!rows||!rows.length)return '<p>No rows returned.</p>';var head='<tr>'+cols.map(function(c){return '<th>'+esc(c)+'</th>';}).join('')+'</tr>';var body=rows.map(function(row){return '<tr>'+cols.map(function(c){return '<td>'+esc(cell(row[c]))+'</td>';}).join('')+'</tr>';}).join('');return '<table>'+head+body+'</table>';}
function cell(v){if(v===null||v===undefined)return '';if(typeof v==='number')return Number.isInteger(v)?String(v):v.toFixed(2);if(typeof v==='boolean')return v?'yes':'no';return String(v);}function fmt(v){if(!v)return '';try{return new Date(v).toISOString().slice(0,16).replace('T',' ');}catch(e){return String(v);}}function num(v){return v===null||v===undefined||Number.isNaN(v)?'NA':Number(v).toFixed(2);}function showError(e){setBusy(false);var m=e&&e.message?e.message:String(e);document.getElementById('status').innerHTML='<div class="error"><b>Error:</b> '+esc(m)+'</div>';}
function setBusy(b){var btn=document.getElementById('runBtn');btn.disabled=b;btn.textContent=b?'Running...':'Run verification';}function val(id){return document.getElementById(id).value;}function esc(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
</script>
</body>
</html>
